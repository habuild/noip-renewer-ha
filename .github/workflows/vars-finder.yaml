---
name: vars-finder

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths: ["vars"]
    tags:
      - '*'

env:
  BUILD_ARGS: |
          BUILD_REF
          BUILD_ARCH
          BUILD_NAME
          BUILD_VERSION
          BUILD_REPOSITORY

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Display Vars via Env Var
        run: echo "The var is $GITHUB_REF_NAME"

      - name: Display Vars via Github Context github.event.release.tag_name
        run: echo "The Var is ${{ github.event.release.tag_name }}"

      - name: Display Vars via github.event.repository.name
        run: echo "The var is ${{ github.event.repository.name }} "

      - name: Display Vars via  steps.matrix.outputs.matrix
        run: echo "The var is ${{ steps.matrix.outputs.matrix }} "

      - name: Display Vars via  BUILD_REPOSITORY
        run: echo "The var is ${{ github.workspace }} "

      - name: Display Vars via  env.IMAGE_NAME /Dockerfile
        run: echo "The var is ./.${{ env.IMAGE_NAME }}/Dockerfile "
